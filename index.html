<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nearest VFR</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Nearest VFR 🇫🇷</h1>
            <button id="settings-btn" aria-label="Réglages">⚙️</button>
        </div>
        <button id="locate-btn" disabled>Chargement...</button>
        <p id="status">Initialisation de la base...</p>
    </header>
    
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Réglages</h2>
            <div class="setting-group">
                <label for="speed-input">Vitesse de croisière (kt) :</label>
                <input type="number" id="speed-input" value="100" min="40" max="300">
            </div>
            <button id="save-settings-btn">Sauvegarder & Fermer</button>
        </div>
    </div>

    <main>
        <div id="map-container">
            <div id="map"></div>
        </div>
        
        <ul id="airport-list"></ul>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
